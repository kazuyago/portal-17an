<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Panitia - 17-an</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-header">
      <h1>LOGIN PANITIA</h1>
      <p>Masuk ke Dashboard Panitia 17-an</p>
    </div>
    <form id="login-form" class="login-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
      </div>
      <button type="submit" class="btn-submit">MASUK</button>
      <p id="login-error" class="error-msg"></p>
    </form>
    <a href="index.html" class="back-link">Kembali ke Beranda</a>
  </div>
  <script src="app.js"></script>
</body>
</html>
